<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Auditor-AI - RAPTOR Security Suite</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="main-container">
        <div id="chat-output"
            style="height: 400px; overflow-y: scroll; border: 1px solid #444; padding: 10px; margin-bottom: 10px; color: white;">
            <p>Auditor-AI listo. Escribe una ruta o comando para analizar.</p>
        </div>

        <div class="input-container">
            <input type="text" id="chat-input" placeholder="Escribe tu consulta aquí..."
                style="width: 80%; padding: 10px;">
            <button id="enviar-btn" onclick="handleSend()" style="padding: 10px;">Enviar</button>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
